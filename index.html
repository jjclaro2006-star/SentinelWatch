<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SentinelWatch — Inteligencia Geoespacial</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Widgets/widgets.css">
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Cesium.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-base:     #050A0F;
      --bg-surface:  #080E18;
      --bg-elevated: #0D1520;
      --bg-hover:    #111E2E;
      --border:      #162030;
      --text-pri:    #C8D8D3;
      --text-sec:    #4A6070;
      --text-muted:  #243040;
      --accent:      #64FFDA;
      --accent-teal: #64FFDA;
      --accent-cyan: #00D4FF;
      --accent-red:  #FF3B3B;
      --sev-alta:    #FF3B3B;
      --sev-media:   #FF9500;
      --sev-baja:    #FFD60A;
      --font-ui:     'Rajdhani', 'Segoe UI', sans-serif;
      --font-mono:   'Share Tech Mono', 'Consolas', monospace;
      --nav-h:       46px;
      --sidebar-w:   284px;
    }
    body.mode-globe     { --accent: #64FFDA; }
    body.mode-map       { --accent: #00D4FF; }
    body.mode-satellite { --accent: #FF3B3B; }

    html, body {
      height: 100%; overflow: hidden;
      background: var(--bg-base); color: var(--text-pri);
      font-family: var(--font-ui); font-size: 12px; line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* Scanlines */
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 9999; pointer-events: none;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px,
        rgba(0,0,0,0.012) 2px, rgba(0,0,0,0.012) 4px);
    }

    /* Globe */
    #cesium-container { position: fixed; inset: 0; z-index: 0; }
    .cesium-widget-credits,
    .cesium-credit-container { display: none !important; }

    /* Corner brackets */
    .corner {
      position: fixed; width: 28px; height: 28px;
      z-index: 80; pointer-events: none;
      transition: border-color 0.8s;
    }
    .corner-tl { top: 8px; left: 8px;
      border-top: 1.5px solid var(--accent); border-left: 1.5px solid var(--accent); }
    .corner-tr { top: 8px; right: 8px;
      border-top: 1.5px solid var(--accent); border-right: 1.5px solid var(--accent); }
    .corner-bl { bottom: 8px; left: 8px;
      border-bottom: 1.5px solid var(--accent); border-left: 1.5px solid var(--accent); }
    .corner-br { bottom: 8px; right: 8px;
      border-bottom: 1.5px solid var(--accent); border-right: 1.5px solid var(--accent); }

    /* ===== NAVBAR ===== */
    #navbar {
      position: fixed; top: 0; left: 0; right: 0; height: var(--nav-h);
      z-index: 100; display: flex; align-items: center; padding: 0 10px; gap: 10px;
      background: rgba(5,10,15,0.85); backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(100,255,218,0.08);
    }
    #sidebar-toggle {
      width: 28px; height: 28px; flex-shrink: 0; cursor: pointer;
      border: 1px solid var(--border); background: transparent;
      color: var(--text-sec); font-size: 13px; display: flex;
      align-items: center; justify-content: center;
      transition: border-color 0.2s, color 0.2s;
    }
    #sidebar-toggle:hover { border-color: var(--accent); color: var(--accent); }

    .nav-logo {
      display: flex; align-items: center; gap: 7px; flex-shrink: 0;
    }
    .nav-logo svg { width: 18px; height: 18px; color: var(--accent); transition: color 0.8s; }
    .nav-logo-text {
      font-family: var(--font-ui); font-weight: 700; font-size: 13px;
      letter-spacing: 0.22em; color: var(--accent); text-transform: uppercase;
      transition: color 0.8s;
    }
    .nav-div { width: 1px; height: 22px; background: var(--border); flex-shrink: 0; }

    .nav-stats { display: flex; gap: 14px; flex: 1; }
    .nav-stat { display: flex; flex-direction: column; gap: 1px; }
    .nav-stat-lbl {
      font-size: 8px; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-sec); font-family: var(--font-mono);
    }
    .nav-stat-val { font-family: var(--font-mono); font-size: 10px; color: var(--text-pri); }

    .nav-live {
      display: flex; align-items: center; gap: 5px; flex-shrink: 0;
      font-family: var(--font-mono); font-size: 9px; color: #4CAF50; letter-spacing: 0.1em;
    }
    .live-dot {
      width: 6px; height: 6px; border-radius: 50%; background: #4CAF50;
      animation: pulsedot 1.5s infinite;
    }
    @keyframes pulsedot {
      0%,100% { opacity:1; transform:scale(1); }
      50% { opacity:0.4; transform:scale(0.75); }
    }

    #countdown {
      font-family: var(--font-mono); font-size: 9px;
      color: var(--text-sec); flex-shrink: 0; letter-spacing: 0.05em;
    }

    .nav-modes { display: flex; gap: 3px; flex-shrink: 0; }
    .mode-btn {
      padding: 3px 9px; border: 1px solid var(--border); background: transparent;
      color: var(--text-sec); font-family: var(--font-ui); font-size: 9px;
      font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
      cursor: pointer; transition: all 0.3s;
    }
    .mode-btn:hover { border-color: var(--accent); color: var(--accent); }
    .mode-btn.active {
      border-color: var(--accent); color: var(--accent);
      background: rgba(100,255,218,0.06);
      box-shadow: 0 0 8px color-mix(in srgb, var(--accent) 30%, transparent);
    }

    /* ===== SIDEBAR ===== */
    #sidebar {
      position: fixed; left: 0; top: var(--nav-h);
      width: var(--sidebar-w); height: calc(100% - var(--nav-h));
      z-index: 90; display: flex; flex-direction: column; overflow: hidden;
      background: rgba(5,10,15,0.82); backdrop-filter: blur(8px);
      border-right: 1px solid var(--border);
      transition: transform 0.35s cubic-bezier(0.23,1,0.32,1);
    }
    #sidebar.collapsed { transform: translateX(calc(-1 * var(--sidebar-w))); }

    .sb-section {
      padding: 8px 11px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .sb-title {
      font-size: 8px; font-weight: 700; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--text-sec); margin-bottom: 6px;
    }

    .filter-group { display: flex; flex-direction: column; gap: 3px; }
    .filter-row {
      display: flex; align-items: center; gap: 6px; cursor: pointer;
      padding: 2px 3px; transition: background 0.15s;
    }
    .filter-row:hover { background: var(--bg-hover); }
    .filter-check {
      width: 11px; height: 11px; border: 1px solid var(--border);
      background: transparent; flex-shrink: 0; position: relative;
      transition: border-color 0.25s;
    }
    .filter-check.on { border-color: var(--accent); background: rgba(100,255,218,0.08); }
    .filter-check.on::after {
      content: ''; position: absolute; inset: 2px; background: var(--accent);
    }
    .filter-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .filter-lbl { font-size: 10px; color: var(--text-pri); }

    .filter-select {
      width: 100%; background: var(--bg-elevated); border: 1px solid var(--border);
      color: var(--text-pri); font-family: var(--font-mono); font-size: 10px;
      padding: 3px 6px; cursor: pointer;
    }
    .filter-select:focus { outline: none; border-color: var(--accent); }

    .sb-list-hdr {
      padding: 5px 11px; border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
      flex-shrink: 0;
    }
    #alert-count {
      font-family: var(--font-mono); font-size: 9px;
      padding: 1px 5px; background: rgba(255,59,59,0.1);
      border: 1px solid rgba(255,59,59,0.25); color: var(--sev-alta);
    }

    #alert-list { flex: 1; overflow-y: auto; }
    #alert-list::-webkit-scrollbar { width: 3px; }
    #alert-list::-webkit-scrollbar-thumb { background: var(--border); }
    #alert-list::-webkit-scrollbar-track { background: transparent; }

    .alert-item {
      display: flex; align-items: flex-start; gap: 7px;
      padding: 7px 11px; border-bottom: 1px solid var(--border);
      cursor: pointer; transition: background 0.12s;
    }
    .alert-item:hover { background: var(--bg-hover); }
    .alert-item.sel { background: rgba(100,255,218,0.04); }
    .alert-sev-bar { width: 3px; align-self: stretch; border-radius: 1px; flex-shrink: 0; }
    .alert-body { flex: 1; min-width: 0; }
    .alert-id {
      font-family: var(--font-mono); font-size: 9px; color: var(--text-sec);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .alert-row {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-top: 2px;
    }
    .alert-act { font-size: 11px; font-weight: 600; text-transform: capitalize; }
    .alert-area { font-family: var(--font-mono); font-size: 9px; color: var(--text-sec); }
    .alert-date { font-family: var(--font-mono); font-size: 9px; color: var(--text-muted); margin-top: 1px; }

    .sb-footer {
      padding: 5px 11px; border-top: 1px solid var(--border);
      display: flex; gap: 10px; flex-shrink: 0;
    }
    .sev-count {
      display: flex; align-items: center; gap: 4px;
      font-family: var(--font-mono); font-size: 10px; color: var(--text-sec);
    }
    .sev-dot { width: 6px; height: 6px; border-radius: 50%; }

    .empty-msg {
      padding: 20px 12px; text-align: center;
      color: var(--text-sec); font-size: 11px;
    }

    /* ===== DETAIL PANEL ===== */
    #detail-panel {
      position: fixed; right: 0; top: var(--nav-h);
      width: 300px; height: calc(100% - var(--nav-h));
      z-index: 95; display: flex; flex-direction: column; overflow: hidden;
      background: rgba(5,10,15,0.88); backdrop-filter: blur(10px);
      border-left: 1px solid var(--border);
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(0.23,1,0.32,1);
    }
    #detail-panel.open { transform: translateX(0); }

    .dp-hdr {
      padding: 11px 13px; border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
      flex-shrink: 0;
    }
    .dp-title {
      font-size: 10px; font-weight: 700; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--accent); transition: color 0.8s;
    }
    .dp-close {
      width: 22px; height: 22px; border: 1px solid var(--border);
      background: transparent; color: var(--text-sec); cursor: pointer;
      font-size: 11px; display: flex; align-items: center; justify-content: center;
      transition: border-color 0.2s, color 0.2s;
    }
    .dp-close:hover { border-color: var(--accent); color: var(--accent); }

    .dp-body { flex: 1; overflow-y: auto; padding: 13px; }
    .dp-body::-webkit-scrollbar { width: 3px; }
    .dp-body::-webkit-scrollbar-thumb { background: var(--border); }

    .dp-banner {
      padding: 7px 9px; margin-bottom: 11px;
      display: flex; align-items: center; gap: 8px; border: 1px solid;
    }
    .dp-sev { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }

    .dp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
    .dp-field {
      padding: 5px 7px; background: var(--bg-elevated); border: 1px solid var(--border);
    }
    .dp-field.full { grid-column: 1 / -1; }
    .dp-lbl {
      font-size: 7px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--text-sec); margin-bottom: 2px;
    }
    .dp-val { font-family: var(--font-mono); font-size: 10px; color: var(--text-pri); word-break: break-all; }
    .c-ilegal { color: var(--sev-alta); }
    .c-verif  { color: var(--sev-media); }

    /* ===== ERROR BANNER ===== */
    #error-banner {
      position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
      background: rgba(255,59,59,0.08); border: 1px solid rgba(255,59,59,0.35);
      color: var(--sev-alta); font-family: var(--font-mono); font-size: 9px;
      padding: 5px 14px; z-index: 200; pointer-events: none;
      letter-spacing: 0.05em; opacity: 0; transition: opacity 0.4s;
    }
    #error-banner.show { opacity: 1; }

    /* ===== HUD MAP ===== */
    #hud-map {
      position: fixed; inset: var(--nav-h) 0 0 0;
      z-index: 70; pointer-events: none;
      opacity: 0; transition: opacity 0.6s;
    }
    body.mode-map #hud-map { opacity: 1; }
    .grid-h {
      position: absolute; left: 0; right: 0; height: 1px;
      background: rgba(0,212,255,0.05);
    }
    .grid-v {
      position: absolute; top: 0; bottom: 0; width: 1px;
      background: rgba(0,212,255,0.05);
    }
    #map-coords {
      position: absolute; top: 7px; right: 11px;
      font-family: var(--font-mono); font-size: 9px;
      color: rgba(0,212,255,0.45); letter-spacing: 0.05em;
    }

    /* ===== HUD SATELLITE ===== */
    #hud-sat {
      position: fixed; inset: 0;
      z-index: 75; pointer-events: none;
      opacity: 0; transition: opacity 0.6s;
    }
    body.mode-satellite #hud-sat { opacity: 1; }

    .xhair {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 44px; height: 44px;
    }
    .xhair::before, .xhair::after {
      content: ''; position: absolute; background: rgba(255,59,59,0.75);
    }
    .xhair::before { width: 1px; height: 100%; left: 50%; top: 0; }
    .xhair::after  { height: 1px; width: 100%; top: 50%; left: 0; }
    .xhair-ring {
      position: absolute; top: 50%; left: 50%;
      width: 22px; height: 22px; border-radius: 50%;
      border: 1px solid rgba(255,59,59,0.65);
      transform: translate(-50%, -50%);
    }
    .tgt {
      position: absolute; top: 50%; left: 50%;
      width: 88px; height: 88px;
      transform: translate(-50%, -50%);
      animation: tgt-pulse 2.2s ease-in-out infinite;
    }
    @keyframes tgt-pulse {
      0%,100% { opacity:0.55; transform:translate(-50%,-50%) scale(1); }
      50% { opacity:1; transform:translate(-50%,-50%) scale(1.06); }
    }
    .bk { position: absolute; width: 13px; height: 13px; border-color: rgba(255,59,59,0.75); border-style: solid; }
    .bk-tl { top:0; left:0; border-width: 1.5px 0 0 1.5px; }
    .bk-tr { top:0; right:0; border-width: 1.5px 1.5px 0 0; }
    .bk-bl { bottom:0; left:0; border-width: 0 0 1.5px 1.5px; }
    .bk-br { bottom:0; right:0; border-width: 0 1.5px 1.5px 0; }

    #hud-cursor {
      position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%);
      font-family: var(--font-mono); font-size: 9px;
      color: rgba(255,59,59,0.6); z-index: 76; pointer-events: none;
      letter-spacing: 0.08em;
    }
    #hud-alt {
      position: fixed; bottom: 15px; right: 14px;
      font-family: var(--font-mono); font-size: 9px;
      color: rgba(255,59,59,0.45); z-index: 76; pointer-events: none;
    }
  </style>
</head>
<body class="mode-globe">

  <div id="cesium-container"></div>

  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <div id="hud-map">
    <div id="map-coords">--°N  --°E</div>
  </div>

  <div id="hud-sat">
    <div class="xhair"></div>
    <div class="xhair-ring"></div>
    <div class="tgt">
      <div class="bk bk-tl"></div>
      <div class="bk bk-tr"></div>
      <div class="bk bk-bl"></div>
      <div class="bk bk-br"></div>
    </div>
  </div>
  <div id="hud-cursor">--°N  --°E</div>
  <div id="hud-alt">ALT: --</div>

  <nav id="navbar">
    <button id="sidebar-toggle">☰</button>
    <div class="nav-logo">
      <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 2L18 7V13L10 18L2 13V7L10 2Z" stroke="currentColor" stroke-width="1.2"/>
        <path d="M10 6L14 8.5V11.5L10 14L6 11.5V8.5L10 6Z" fill="currentColor" opacity="0.25"/>
        <circle cx="10" cy="10" r="1.8" fill="currentColor"/>
      </svg>
      <span class="nav-logo-text">SentinelWatch</span>
    </div>
    <div class="nav-div"></div>
    <div class="nav-stats">
      <div class="nav-stat">
        <span class="nav-stat-lbl">Alertas</span>
        <span class="nav-stat-val" id="stat-total">—</span>
      </div>
      <div class="nav-stat">
        <span class="nav-stat-lbl">Fecha</span>
        <span class="nav-stat-val" id="stat-date">—</span>
      </div>
      <div class="nav-stat" style="max-width:130px;overflow:hidden">
        <span class="nav-stat-lbl">Fuente</span>
        <span class="nav-stat-val" id="stat-file" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block">—</span>
      </div>
    </div>
    <div class="nav-live"><div class="live-dot"></div>LIVE</div>
    <span id="countdown">NEXT SCAN: 30s</span>
    <div class="nav-modes">
      <button class="mode-btn active" data-mode="globe">GLOBO</button>
      <button class="mode-btn" data-mode="map">MAPA</button>
      <button class="mode-btn" data-mode="satellite">SATELITAL</button>
    </div>
  </nav>

  <aside id="sidebar">
    <div class="sb-section">
      <div class="sb-title">Actividad</div>
      <div class="filter-group" id="filt-act"></div>
    </div>
    <div class="sb-section">
      <div class="sb-title">Severidad</div>
      <div class="filter-group" id="filt-sev"></div>
    </div>
    <div class="sb-section">
      <div class="sb-title">Veredicto</div>
      <select class="filter-select" id="filt-ver">
        <option value="all">Todos</option>
        <option value="ILEGAL">ILEGAL</option>
        <option value="Requiere">Requiere verificación</option>
      </select>
    </div>
    <div class="sb-list-hdr">
      <span class="sb-title" style="margin:0">Alertas</span>
      <span id="alert-count">0</span>
    </div>
    <div id="alert-list"><div class="empty-msg">Cargando…</div></div>
    <div class="sb-footer">
      <div class="sev-count"><div class="sev-dot" style="background:var(--sev-alta)"></div><span id="n-alta">0</span></div>
      <div class="sev-count"><div class="sev-dot" style="background:var(--sev-media)"></div><span id="n-media">0</span></div>
      <div class="sev-count"><div class="sev-dot" style="background:var(--sev-baja)"></div><span id="n-baja">0</span></div>
    </div>
  </aside>

  <div id="detail-panel">
    <div class="dp-hdr">
      <span class="dp-title">Detalle de Alerta</span>
      <button class="dp-close" id="dp-close">✕</button>
    </div>
    <div class="dp-body" id="dp-body"></div>
  </div>

  <div id="error-banner"></div>

<script>
// ============================================================
// CONFIG
// ============================================================
const API_BASE    = "http://localhost:8000";
const CESIUM_TOK  = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI4ZjRhY2EzOC1lYTJjLTQ5ZGItYjEwMi00OWY4M2VhODU5MGEiLCJpZCI6NDQ1OTczLCJzdWIiOiJqamNsYXJvMjAwNi1zdGFyIiwiaXNzIjoiaHR0cHM6Ly9hcGkuY2VzaXVtLmNvbSIsImF1ZCI6ImpqY2xhcm8yMDA2LXN0YXJfZGVmYXVsdCIsImlhdCI6MTc4MTc0OTgyN30.5yuXpDZJjOdRUZ1yQeSk98NcSHMHY7dsdnamp9Nld0A";
const POLL_S      = 30;
const GLOBE_H     = 3_000_000;
const MAP_H       = 500_000;

// ============================================================
// STATE
// ============================================================
const S = {
  mode:      'globe',
  alerts:    [],
  filtered:  [],
  selected:  null,
  fAct:      new Set(['all']),
  fSev:      new Set(['all']),
  fVer:      'all',
  esriLayer: null,
  rotating:  true,
  countdown: POLL_S,
};

// ============================================================
// CESIUM INIT
// ============================================================
Cesium.Ion.defaultAccessToken = CESIUM_TOK;

const viewer = new Cesium.Viewer('cesium-container', {
  animation: false, baseLayerPicker: false, fullscreenButton: false,
  vrButton: false, geocoder: false, homeButton: false, infoBox: false,
  sceneModePicker: false, selectionIndicator: false, timeline: false,
  navigationHelpButton: false,
  creditContainer: document.createElement('div'),
});

viewer.camera.setView({
  destination: Cesium.Cartesian3.fromDegrees(-60, -15, 8_000_000)
});

viewer.scene.skyAtmosphere.show = true;
viewer.scene.fog.enabled = false;
viewer.scene.globe.showGroundAtmosphere = true;

// ESRI World Imagery layer (added only in satellite mode)
S.esriLayer = new Cesium.ImageryLayer(
  new Cesium.UrlTemplateImageryProvider({
    url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
    maximumLevel: 19,
  }),
  { alpha: 1.0 }
);

// ============================================================
// SVG BILLBOARD FACTORY
// ============================================================
const _svgCache = {};

function billboardURL(severity, style) {
  const key = style + '_' + severity;
  if (_svgCache[key]) return _svgCache[key];
  const c = severity === 'alta' ? '#FF3B3B' : severity === 'media' ? '#FF9500' : '#FFD60A';
  let svg;
  if (style === 'dot') {
    svg = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 14 14">
      <circle cx="7" cy="7" r="5" fill="${c}" opacity="0.25"/>
      <circle cx="7" cy="7" r="3" fill="${c}" opacity="0.9"/>
      <circle cx="7" cy="7" r="1.2" fill="#fff" opacity="0.85"/>
    </svg>`;
  } else {
    svg = `<svg xmlns="http://www.w3.org/2000/svg" width="34" height="34" viewBox="0 0 34 34">
      <defs>
        <filter id="gf" x="-60%" y="-60%" width="220%" height="220%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <g filter="url(#gf)">
        <line x1="17" y1="3"  x2="17" y2="12" stroke="${c}" stroke-width="1.5"/>
        <line x1="17" y1="22" x2="17" y2="31" stroke="${c}" stroke-width="1.5"/>
        <line x1="3"  y1="17" x2="12" y2="17" stroke="${c}" stroke-width="1.5"/>
        <line x1="22" y1="17" x2="31" y2="17" stroke="${c}" stroke-width="1.5"/>
        <circle cx="17" cy="17" r="6" stroke="${c}" stroke-width="1.5" fill="none"/>
        <circle cx="17" cy="17" r="2" fill="${c}"/>
        <line x1="13.5" y1="13.5" x2="15"   y2="15"   stroke="${c}" stroke-width="0.8" opacity="0.5"/>
        <line x1="20.5" y1="13.5" x2="19"   y2="15"   stroke="${c}" stroke-width="0.8" opacity="0.5"/>
        <line x1="13.5" y1="20.5" x2="15"   y2="19"   stroke="${c}" stroke-width="0.8" opacity="0.5"/>
        <line x1="20.5" y1="20.5" x2="19"   y2="19"   stroke="${c}" stroke-width="0.8" opacity="0.5"/>
      </g>
    </svg>`;
  }
  const url = 'data:image/svg+xml;base64,' + btoa(svg);
  _svgCache[key] = url;
  return url;
}

// ============================================================
// RENDER ALERTS
// ============================================================
function renderAlerts(alerts) {
  viewer.entities.removeAll();
  const isGlobe = S.mode === 'globe';
  alerts.forEach(p => {
    const lat = parseFloat(p.lat), lon = parseFloat(p.lon);
    if (isNaN(lat) || isNaN(lon)) return;
    const sev = normSev(p.severity || p.severidad);
    const entity = viewer.entities.add({
      position: Cesium.Cartesian3.fromDegrees(lon, lat),
      billboard: isGlobe
        ? { image: billboardURL(sev,'dot'), width:14, height:14,
            verticalOrigin: Cesium.VerticalOrigin.CENTER,
            scaleByDistance: new Cesium.NearFarScalar(5e5, 1.2, 2e7, 0.4),
            translucencyByDistance: new Cesium.NearFarScalar(3e6, 1.0, 1.5e7, 0.5) }
        : { image: billboardURL(sev,'xhair'), width:34, height:34,
            verticalOrigin: Cesium.VerticalOrigin.CENTER,
            scaleByDistance: new Cesium.NearFarScalar(5e4, 1.2, 3e6, 0.5) }
    });
    entity._ap = p;
  });
}

// ============================================================
// MODE SWITCHING
// ============================================================
function setMode(mode, force) {
  if (mode === S.mode && !force) return;
  S.mode = mode;
  document.body.className = 'mode-' + mode;

  const hasEsri = viewer.imageryLayers.contains(S.esriLayer);
  if (mode === 'satellite' && !hasEsri) viewer.imageryLayers.add(S.esriLayer);
  if (mode !== 'satellite' && hasEsri) viewer.imageryLayers.remove(S.esriLayer, false);

  S.rotating = (mode === 'globe');

  document.querySelectorAll('.mode-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.mode === mode)
  );

  renderAlerts(S.filtered);
}

// ============================================================
// AUTO-ROTATE
// ============================================================
viewer.clock.onTick.addEventListener(() => {
  if (S.rotating) viewer.camera.rotate(Cesium.Cartesian3.UNIT_Z, -0.0005);
});

// Pause rotate on user drag, resume after 3s
viewer.scene.canvas.addEventListener('pointerdown', () => {
  if (S.mode === 'globe') S.rotating = false;
});
viewer.scene.canvas.addEventListener('pointerup', () => {
  if (S.mode === 'globe') setTimeout(() => { S.rotating = true; }, 3000);
});

// ============================================================
// CAMERA HEIGHT → MODE DETECTION
// ============================================================
viewer.camera.changed.addEventListener(() => {
  const carto = viewer.camera.positionCartographic;
  if (!carto) return;
  const h = carto.height;
  const newMode = h > GLOBE_H ? 'globe' : h > MAP_H ? 'map' : 'satellite';
  setMode(newMode, false);

  // Alt display
  document.getElementById('hud-alt').textContent =
    h > 1000 ? `ALT: ${(h/1000).toFixed(0)} km` : `ALT: ${h.toFixed(0)} m`;

  // Map coords
  if (S.mode === 'map') {
    const lat = Cesium.Math.toDegrees(carto.latitude).toFixed(3);
    const lon = Cesium.Math.toDegrees(carto.longitude).toFixed(3);
    document.getElementById('map-coords').textContent = `${lat}°N  ${lon}°E`;
  }
});

// ============================================================
// CLICK HANDLER
// ============================================================
const clickH = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
clickH.setInputAction(e => {
  const picked = viewer.scene.pick(e.position);
  if (Cesium.defined(picked) && picked.id && picked.id._ap) {
    selectAlert(picked.id._ap);
  } else {
    closeDetail();
  }
}, Cesium.ScreenSpaceEventType.LEFT_CLICK);

// ============================================================
// MOUSE MOVE → CURSOR COORDS (satellite mode)
// ============================================================
const moveH = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
moveH.setInputAction(e => {
  if (S.mode !== 'satellite') return;
  const cart = viewer.camera.pickEllipsoid(e.endPosition, viewer.scene.globe.ellipsoid);
  if (cart) {
    const c = Cesium.Cartographic.fromCartesian(cart);
    document.getElementById('hud-cursor').textContent =
      `${Cesium.Math.toDegrees(c.latitude).toFixed(5)}°N  ${Cesium.Math.toDegrees(c.longitude).toFixed(5)}°E`;
  }
}, Cesium.ScreenSpaceEventType.MOUSE_MOVE);

// ============================================================
// SELECT ALERT
// ============================================================
function selectAlert(p) {
  S.selected = p;
  const lat = parseFloat(p.lat), lon = parseFloat(p.lon);
  viewer.camera.flyTo({
    destination: Cesium.Cartesian3.fromDegrees(lon, lat, 50000),
    duration: 2.0,
    easingFunction: Cesium.EasingFunction.CUBIC_IN_OUT,
  });
  showDetail(p);
  document.querySelectorAll('.alert-item').forEach(el =>
    el.classList.toggle('sel', el.dataset.id === (p.id || ''))
  );
}

// ============================================================
// DETAIL PANEL
// ============================================================
function showDetail(p) {
  const sev   = normSev(p.severity || p.severidad);
  const sc    = sev === 'alta' ? 'var(--sev-alta)' : sev === 'media' ? 'var(--sev-media)' : 'var(--sev-baja)';
  const act   = p.actividad || 'normal';
  const ver   = p.veredicto || '—';
  const vcls  = ver.includes('ILEGAL') ? 'c-ilegal' : ver !== '—' ? 'c-verif' : '';
  const conf  = p.confianza != null ? (parseFloat(p.confianza)*100).toFixed(1)+'%' : '—';
  const ndvi  = p.ndvi_change != null ? parseFloat(p.ndvi_change).toFixed(4) : '—';
  const area  = p.area_ha != null ? parseFloat(p.area_ha).toFixed(2)+' ha' : '—';

  document.getElementById('dp-body').innerHTML = `
    <div class="dp-banner" style="border-color:${sc};background:${sc}18">
      <span class="dp-sev" style="color:${sc}">${sev.toUpperCase()}</span>
      <span style="font-family:var(--font-mono);font-size:9px;color:var(--text-sec)">${act.toUpperCase()}</span>
    </div>
    <div class="dp-grid">
      <div class="dp-field"><div class="dp-lbl">Severidad</div><div class="dp-val" style="color:${sc}">${sev}</div></div>
      <div class="dp-field"><div class="dp-lbl">Actividad</div><div class="dp-val">${act}</div></div>
      <div class="dp-field full"><div class="dp-lbl">Veredicto</div><div class="dp-val ${vcls}">${ver}</div></div>
      <div class="dp-field"><div class="dp-lbl">Área</div><div class="dp-val">${area}</div></div>
      <div class="dp-field"><div class="dp-lbl">Confianza</div><div class="dp-val">${conf}</div></div>
      <div class="dp-field"><div class="dp-lbl">ΔNDVI</div><div class="dp-val">${ndvi}</div></div>
      <div class="dp-field"><div class="dp-lbl">Fecha</div><div class="dp-val">${p.detection_date||'—'}</div></div>
      <div class="dp-field"><div class="dp-lbl">Lat</div><div class="dp-val">${parseFloat(p.lat).toFixed(6)}</div></div>
      <div class="dp-field"><div class="dp-lbl">Lon</div><div class="dp-val">${parseFloat(p.lon).toFixed(6)}</div></div>
      <div class="dp-field full"><div class="dp-lbl">ID</div><div class="dp-val" style="font-size:9px">${p.id||'—'}</div></div>
    </div>`;
  document.getElementById('detail-panel').classList.add('open');
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
  S.selected = null;
  document.querySelectorAll('.alert-item').forEach(el => el.classList.remove('sel'));
}
document.getElementById('dp-close').addEventListener('click', closeDetail);

// ============================================================
// SIDEBAR TOGGLE
// ============================================================
document.getElementById('sidebar-toggle').addEventListener('click', () =>
  document.getElementById('sidebar').classList.toggle('collapsed')
);

// ============================================================
// MODE BUTTONS (manual override)
// ============================================================
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const m = btn.dataset.mode;
    const targets = { globe: 8_000_000, map: 1_500_000, satellite: 150_000 };
    const carto = viewer.camera.positionCartographic;
    const lat = carto ? Cesium.Math.toDegrees(carto.latitude) : -15;
    const lon = carto ? Cesium.Math.toDegrees(carto.longitude) : -60;
    viewer.camera.flyTo({
      destination: Cesium.Cartesian3.fromDegrees(lon, lat, targets[m]),
      duration: 1.5,
    });
    setMode(m, true);
  });
});

// ============================================================
// FILTERS: INIT CHECKBOXES
// ============================================================
const ACTS = [
  { id:'all',          lbl:'Todas',          c:'var(--text-sec)' },
  { id:'deforestacion',lbl:'Deforestación',  c:'var(--sev-alta)' },
  { id:'mineria',      lbl:'Minería',        c:'var(--sev-media)' },
  { id:'agricultura',  lbl:'Agricultura',    c:'var(--sev-baja)' },
  { id:'incendio',     lbl:'Incendio',       c:'#FF6B00' },
  { id:'asentamiento', lbl:'Asentamiento',   c:'#9B59B6' },
  { id:'normal',       lbl:'Normal',         c:'var(--text-sec)' },
];
const SEVS = [
  { id:'all',   lbl:'Todas', c:'var(--text-sec)' },
  { id:'alta',  lbl:'Alta',  c:'var(--sev-alta)' },
  { id:'media', lbl:'Media', c:'var(--sev-media)' },
  { id:'baja',  lbl:'Baja',  c:'var(--sev-baja)' },
];

function buildCheckboxes(containerId, items, filterSet, onToggle) {
  const container = document.getElementById(containerId);
  items.forEach(it => {
    const row = document.createElement('div');
    row.className = 'filter-row';
    row.dataset.val = it.id;
    row.innerHTML = `
      <div class="filter-check ${it.id==='all'?'on':''}"></div>
      <div class="filter-dot" style="background:${it.c}"></div>
      <span class="filter-lbl">${it.lbl}</span>`;
    row.addEventListener('click', () => onToggle(it.id, row, container, filterSet));
    container.appendChild(row);
  });
}

function toggleCheck(id, row, container, filterSet) {
  const chk = row.querySelector('.filter-check');
  if (id === 'all') {
    filterSet.clear(); filterSet.add('all');
    container.querySelectorAll('.filter-check').forEach(c => c.classList.remove('on'));
    chk.classList.add('on');
  } else {
    filterSet.delete('all');
    container.querySelector('[data-val="all"] .filter-check').classList.remove('on');
    if (filterSet.has(id)) {
      filterSet.delete(id); chk.classList.remove('on');
      if (filterSet.size === 0) {
        filterSet.add('all');
        container.querySelector('[data-val="all"] .filter-check').classList.add('on');
      }
    } else {
      filterSet.add(id); chk.classList.add('on');
    }
  }
  applyFilters();
}

buildCheckboxes('filt-act', ACTS, S.fAct, toggleCheck);
buildCheckboxes('filt-sev', SEVS, S.fSev, toggleCheck);
document.getElementById('filt-ver').addEventListener('change', e => {
  S.fVer = e.target.value; applyFilters();
});

// ============================================================
// MAP GRID LINES
// ============================================================
(function buildGrid() {
  const hud = document.getElementById('hud-map');
  for (let i = 1; i < 6; i++) {
    const l = document.createElement('div'); l.className = 'grid-h';
    l.style.top = `${(i/6)*100}%`; hud.appendChild(l);
  }
  for (let i = 1; i < 8; i++) {
    const l = document.createElement('div'); l.className = 'grid-v';
    l.style.left = `${(i/8)*100}%`; hud.appendChild(l);
  }
})();

// ============================================================
// NORMALIZE SEVERITY  (API returns low/medium/high OR baja/media/alta)
// ============================================================
function normSev(raw) {
  const s = (raw || 'baja').toLowerCase();
  if (s === 'high'   || s === 'alta')  return 'alta';
  if (s === 'medium' || s === 'media') return 'media';
  return 'baja';
}

// ============================================================
// APPLY FILTERS
// ============================================================
function applyFilters() {
  S.filtered = S.alerts.filter(p => {
    const act = (p.actividad || 'normal').toLowerCase();
    const sev = normSev(p.severity || p.severidad);
    const ver = p.veredicto || '';
    return (S.fAct.has('all') || S.fAct.has(act))
        && (S.fSev.has('all') || S.fSev.has(sev))
        && (S.fVer === 'all'  || ver.includes(S.fVer));
  });
  renderAlerts(S.filtered);
  renderList(S.filtered);
}

// ============================================================
// RENDER ALERT LIST
// ============================================================
function renderList(alerts) {
  document.getElementById('alert-count').textContent = alerts.length;
  const list = document.getElementById('alert-list');
  if (!alerts.length) {
    list.innerHTML = '<div class="empty-msg">Sin alertas</div>'; return;
  }
  const sorted = [...alerts].sort((a, b) => {
    const o = { alta:0, media:1, baja:2 };
    return (o[normSev(a.severity||a.severidad)]??3) - (o[normSev(b.severity||b.severidad)]??3);
  });
  list.innerHTML = '';
  sorted.forEach(p => {
    const sev = normSev(p.severity||p.severidad);
    const sc  = sev==='alta'?'var(--sev-alta)':sev==='media'?'var(--sev-media)':'var(--sev-baja)';
    const el  = document.createElement('div');
    el.className = 'alert-item' + (S.selected && S.selected.id===p.id ? ' sel' : '');
    el.dataset.id = p.id || '';
    el.innerHTML = `
      <div class="alert-sev-bar" style="background:${sc}"></div>
      <div class="alert-body">
        <div class="alert-id">${(p.id||'—').slice(0,18)}…</div>
        <div class="alert-row">
          <span class="alert-act">${p.actividad||'normal'}</span>
          <span class="alert-area">${p.area_ha!=null?parseFloat(p.area_ha).toFixed(1)+' ha':''}</span>
        </div>
        <div class="alert-date">${p.detection_date||''}</div>
      </div>`;
    el.addEventListener('click', () => selectAlert(p));
    list.appendChild(el);
  });

  // Footer counts
  const counts = { alta:0, media:0, baja:0 };
  alerts.forEach(p => {
    const s = normSev(p.severity||p.severidad);
    if (counts[s]!=null) counts[s]++;
  });
  document.getElementById('n-alta').textContent  = counts.alta;
  document.getElementById('n-media').textContent = counts.media;
  document.getElementById('n-baja').textContent  = counts.baja;
}

// ============================================================
// FETCH DATA
// ============================================================
async function fetchData() {
  try {
    const [ra, rs] = await Promise.all([
      fetch(API_BASE + '/alerts'),
      fetch(API_BASE + '/alerts/summary'),
    ]);
    if (!ra.ok || !rs.ok) throw new Error('HTTP ' + ra.status);
    const geojson = await ra.json();
    const summary = await rs.json();
    S.alerts = (geojson.features || []).map(f => f.properties).filter(Boolean);
    // Update stats
    document.getElementById('stat-total').textContent = summary.total_alerts ?? S.alerts.length;
    document.getElementById('stat-date').textContent  = summary.detection_date || '—';
    const files = summary.source_files || (summary.source_file ? [summary.source_file] : []);
    document.getElementById('stat-file').textContent  = files.length ? files[files.length-1] : '—';
    applyFilters();
    hideErr();
  } catch(e) {
    showErr('API no disponible — reintentando');
  }
}

function showErr(msg) {
  const el = document.getElementById('error-banner');
  el.textContent = '⚠ ' + msg; el.classList.add('show');
}
function hideErr() {
  document.getElementById('error-banner').classList.remove('show');
}

// ============================================================
// POLLING
// ============================================================
fetchData();
setInterval(fetchData, POLL_S * 1000);
setInterval(() => {
  S.countdown = S.countdown > 0 ? S.countdown - 1 : POLL_S;
  document.getElementById('countdown').textContent = `NEXT SCAN: ${S.countdown}s`;
}, 1000);
</script>
</body>
</html>
